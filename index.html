<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meu Futebol Live</title>
<style>
:root{--bg:#08111f;--card:#101827;--soft:#1f2a3d;--text:#e5e7eb;--muted:#94a3b8;--green:#22c55e;--red:#ef4444;--yellow:#facc15}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
header{position:sticky;top:0;z-index:10;background:#0b1220;border-bottom:1px solid #1f2937;padding:14px 18px;display:flex;gap:12px;align-items:center;justify-content:space-between}
h1{font-size:20px;margin:0}.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
input,select,button{border:0;border-radius:10px;padding:10px;background:#1f2937;color:#fff}
button{background:var(--green);color:#052e13;font-weight:700;cursor:pointer}
main{display:grid;grid-template-columns:1fr 280px;gap:14px;padding:14px}.ad{background:#111827;border:1px dashed #64748b;border-radius:14px;padding:14px;color:#94a3b8;min-height:180px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}.card{background:var(--card);border:1px solid #243449;border-radius:16px;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,.16)}
.card.live{border-color:var(--red)}.league{font-size:12px;color:var(--muted);margin-bottom:8px}.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
.team{font-weight:700}.away{text-align:right}.score{font-size:24px;color:var(--yellow);font-weight:800;white-space:nowrap}
.meta{margin-top:8px;color:var(--muted);font-size:12px;display:flex;gap:8px;flex-wrap:wrap}.pill{padding:4px 8px;border-radius:999px;background:var(--soft)}
.live .pill{background:#3b1212;color:#fecaca}.details{display:none;margin-top:12px;border-top:1px solid #243449;padding-top:10px}
table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}th,td{border-bottom:1px solid #243449;text-align:left;padding:6px;vertical-align:top}th{color:#cbd5e1}
.small{font-size:12px;color:var(--muted)}.error{color:#fecaca;background:#3b1212;padding:8px;border-radius:10px;margin:8px 0}
@media(max-width:900px){main{grid-template-columns:1fr}.ad{display:none}}
</style>
</head>
<body>
<header>
  <h1>Meu Futebol Live</h1>
  <div class="controls">
    <input type="date" id="date">
    <select id="filter">
      <option value="">Todos</option>
      <option value="live">Só ao vivo</option>
      <option value="pre">Futuros</option>
      <option value="post">Finalizados</option>
    </select>
    <button onclick="loadGames()">Atualizar</button>
  </div>
</header>
<main>
  <section>
    <div id="status" class="small">Carregando...</div>
    <div id="games" class="grid"></div>
  </section>
  <aside>
    <div class="ad"><b>Espaço para anúncio</b><br><br>Futuro banner de fornecedor, casa de aposta, empresa local ou parceiro.</div>
    <br>
    <div class="ad"><b>Plano futuro</b><br><br>Filtros, favoritos, alertas de gol, análise de chutes/escanteios e ranking de jogadores.</div>
  </aside>
</main>
<script>
const dateEl = document.getElementById("date");
dateEl.value = new Date().toISOString().slice(0,10);
let allGames = [];

function esc(s){return String(s ?? "").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}

async function loadGames(){
  const status = document.getElementById("status");
  const box = document.getElementById("games");
  status.textContent = "Buscando jogos...";
  try{
    const res = await fetch("/api/games?date="+dateEl.value+"&_="+Date.now());
    const data = await res.json();
    if(!data.ok) throw new Error(data.error);
    allGames = data.games || [];
    status.textContent = `${data.total} jogos encontrados. Atualiza sozinho a cada 20s.`;
    renderGames();
  }catch(e){
    status.innerHTML = `<div class="error">Erro: ${esc(e.message || e)}</div>`;
  }
}

function renderGames(){
  const filter = document.getElementById("filter").value;
  const box = document.getElementById("games");
  let games = allGames;
  if(filter === "live") games = games.filter(g => g.live);
  if(filter === "pre") games = games.filter(g => g.state === "pre");
  if(filter === "post") games = games.filter(g => g.state === "post");
  box.innerHTML = "";
  games.forEach(g=>{
    const card = document.createElement("div");
    card.className = "card " + (g.live ? "live" : "");
    card.innerHTML = `
      <div class="league">${esc(g.league)}</div>
      <div class="teams">
        <div class="team">${esc(g.home.name)}</div>
        <div class="score">${esc(g.home.score)} x ${esc(g.away.score)}</div>
        <div class="team away">${esc(g.away.name)}</div>
      </div>
      <div class="meta">
        <span class="pill">${esc(g.status)}</span>
        <span>${esc(g.minute)}</span>
        <span>${esc(g.time)}</span>
      </div>
      <button style="margin-top:10px" onclick="details('${esc(g.leagueKey)}','${esc(g.id)}',this)">Ver estatísticas</button>
      <div class="details"></div>
    `;
    box.appendChild(card);
  });
}

async function details(league,id,btn){
  const div = btn.nextElementSibling;
  div.style.display = "block";
  div.innerHTML = "Carregando estatísticas...";
  try{
    const res = await fetch(`/api/game/${encodeURIComponent(league)}/${encodeURIComponent(id)}?_=${Date.now()}`);
    const data = await res.json();
    if(!data.ok) throw new Error(data.error);
    let html = `<div class="small">${esc(data.note || "")}</div>`;

    html += `<h4>Estatísticas dos times</h4>`;
    html += `<table><tr><th>Time</th><th>Estatística</th><th>Valor</th></tr>`;
    (data.teamStats || []).forEach(s => html += `<tr><td>${esc(s.team)}</td><td>${esc(s.label || s.name)}</td><td>${esc(s.value)}</td></tr>`);
    html += `</table>`;

    html += `<h4>Eventos / lances</h4>`;
    html += `<table><tr><th>Tempo</th><th>Time</th><th>Tipo</th><th>Descrição</th></tr>`;
    (data.events || []).slice(0,80).forEach(e => html += `<tr><td>${esc(e.minute)}</td><td>${esc(e.team)}</td><td>${esc(e.type)}</td><td>${esc(e.text)}</td></tr>`);
    html += `</table>`;

    html += `<h4>Jogadores</h4>`;
    html += `<table><tr><th>Time</th><th>Jogador</th><th>Grupo</th><th>Stats</th></tr>`;
    (data.playerStats || []).forEach(p => html += `<tr><td>${esc(p.team)}</td><td>${esc(p.player)}</td><td>${esc(p.group)}</td><td>${esc(JSON.stringify(p.stats))}</td></tr>`);
    html += `</table>`;

    if((data.teamStats||[]).length===0 && (data.playerStats||[]).length===0){
      html += `<div class="error">Essa partida/liga não entregou estatísticas detalhadas pela fonte grátis.</div>`;
    }
    div.innerHTML = html;
  }catch(e){
    div.innerHTML = `<div class="error">Erro: ${esc(e.message || e)}</div>`;
  }
}

document.getElementById("filter").addEventListener("change", renderGames);
loadGames();
setInterval(loadGames, 20000);
</script>
</body>
</html>
