<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>DhuniorStats</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef2f7;--surface:#ffffff;--surface2:#f8fafc;--line:#dde5ef;--text:#07111f;--muted:#64748b;
  --brand:#ef233c;--green:#16a34a;--blue:#2563eb;--yellow:#d97706;--shadow:0 12px 32px rgba(15,23,42,.08);
}
[data-theme="dark"]{
  --bg:#08111f;--surface:#0f1b2d;--surface2:#142238;--line:rgba(255,255,255,.09);--text:#f8fafc;--muted:#94a3b8;
  --shadow:0 16px 48px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}
button,input,select{font-family:inherit}
.topbar{height:64px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 18px;position:sticky;top:0;z-index:20}
.logo{font-size:26px;font-weight:950;letter-spacing:-.8px;white-space:nowrap}.logo span{color:var(--brand)}
.search{flex:1;max-width:620px;background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--text);font-weight:700}
.themeSwitch{display:flex;gap:6px;background:var(--surface2);border:1px solid var(--line);padding:4px;border-radius:999px}
.themeSwitch button{border:0;background:transparent;color:var(--muted);padding:8px 12px;border-radius:999px;font-weight:900;cursor:pointer}
.themeSwitch button.active{background:var(--brand);color:#fff}
.layout{display:grid;grid-template-columns:240px minmax(420px,1fr) 360px;gap:16px;padding:16px;max-width:1680px;margin:0 auto}
.sidebar,.center,.right{min-width:0}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
.menu{padding:12px;display:grid;gap:8px}.menu button{border:0;background:transparent;color:var(--muted);text-align:left;font-weight:850;padding:12px;border-radius:12px;cursor:pointer}.menu button.active,.menu button:hover{background:rgba(239,35,60,.10);color:var(--brand)}
.filterBar{display:flex;gap:10px;margin-bottom:12px}.field,.btn{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 13px;color:var(--text);font-weight:800}.btn{cursor:pointer}
.leagueHeader{font-size:13px;color:var(--muted);font-weight:950;margin:16px 0 8px;text-transform:uppercase;letter-spacing:.5px}
.matchList{display:grid;gap:8px}
.match{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;cursor:pointer;box-shadow:0 6px 18px rgba(15,23,42,.04)}
.match:hover,.match.active{border-color:var(--brand);box-shadow:0 10px 28px rgba(239,35,60,.10)}
.match small{color:var(--muted);font-weight:800}.teams{display:grid;gap:7px;margin-top:8px}.teamLine{display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:900}.teamName{display:flex;align-items:center;gap:8px;min-width:0}.miniLogo{width:22px;height:22px;border-radius:50%;object-fit:contain;background:#fff;border:1px solid var(--line)}.score{font-weight:950;color:var(--yellow)}
.matchHeader{overflow:hidden}.scoreboard{background:linear-gradient(180deg,var(--surface),var(--surface2));padding:22px 22px 16px;border-bottom:1px solid var(--line)}
.competition{display:flex;justify-content:center;color:var(--muted);font-weight:850;font-size:13px;margin-bottom:16px}
.scoreTeams{display:grid;grid-template-columns:1fr 170px 1fr;align-items:center;gap:10px}.mainTeam{text-align:center}.mainLogo{width:76px;height:76px;border-radius:50%;object-fit:contain;background:#fff;border:1px solid var(--line);padding:6px}.mainName{font-size:19px;font-weight:950;margin-top:8px}.scoreBox{text-align:center}.status{display:inline-block;background:var(--brand);color:#fff;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:950}.bigScore{font-size:48px;font-weight:950;letter-spacing:-2px;margin-top:8px}.minute{color:var(--green);font-weight:950;margin-top:4px}
.tabs{display:flex;gap:6px;padding:10px 12px;background:var(--surface);overflow:auto}.tabs button{border:0;background:transparent;color:var(--muted);font-weight:950;padding:10px 12px;border-radius:10px;cursor:pointer;white-space:nowrap}.tabs button.active{color:var(--brand);background:rgba(239,35,60,.10)}
.contentPanel{padding:14px}.aiBox{padding:16px;background:var(--surface2);border:1px solid var(--line);border-radius:14px;margin-bottom:14px}.aiTitle{font-size:14px;color:var(--muted);font-weight:950;margin-bottom:8px}.aiText{font-size:19px;font-weight:900;line-height:1.35}
.statsGrid{display:grid;gap:10px}.statRow{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px}.statTop{display:flex;justify-content:space-between;font-weight:950;font-size:19px}.statLabel{text-align:center;color:var(--muted);font-size:12px;font-weight:950;text-transform:uppercase;margin:7px 0}.bar{height:8px;background:var(--line);border-radius:99px;overflow:hidden;display:flex}.homeBar{background:var(--green)}.awayBar{background:var(--brand)}
.probGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}.prob{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px}.prob b{font-size:26px}.trendList{display:grid;gap:8px}.trend{padding:11px;border-radius:12px;background:var(--surface2);color:var(--muted);font-weight:850}.trend.good{color:var(--green)}.trend.bad{color:var(--brand)}
.right{display:grid;gap:14px;align-content:start}.sideCard{padding:16px}.sideTitle{font-weight:950;margin-bottom:10px}.base{display:grid;gap:9px;color:var(--muted);line-height:1.45;font-size:14px}.event{display:grid;grid-template-columns:42px 1fr;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;color:var(--muted)}.event b{color:var(--text)}
.empty{padding:30px;text-align:center;color:var(--muted);font-weight:800}
.mobileTitle{display:none}
@media(max-width:1180px){.layout{grid-template-columns:1fr 330px}.sidebar{display:none}.mobileTitle{display:block}.scoreTeams{grid-template-columns:1fr 130px 1fr}}
@media(max-width:860px){.layout{grid-template-columns:1fr}.right{grid-template-columns:1fr}.topbar{gap:10px}.search{display:none}.scoreTeams{grid-template-columns:1fr}.mainTeam{display:grid;justify-items:center}.bigScore{font-size:42px}}
</style>
</head>
<body data-theme="light">
<header class="topbar">
  <div class="logo">Dhunior<span>Stats</span></div>
  <input class="search" id="searchInput" placeholder="Pesquisar partidas, competições e times" />
  <div class="themeSwitch">
    <button id="lightBtn" class="active">Claro</button>
    <button id="darkBtn">Escuro</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar card">
    <div class="menu">
      <button class="active" data-tab="overview">🔥 Em destaque</button>
      <button data-tab="stats">📊 Estatísticas</button>
      <button data-tab="ai">🧠 Leitura IA</button>
      <button data-tab="post">📌 Pós-jogo</button>
      <button data-tab="news">📰 Notícias</button>
    </div>
  </aside>

  <main class="center">
    <div class="filterBar">
      <input class="field" type="date" id="dateInput">
      <select class="field" id="filterInput">
        <option value="">Todos</option>
        <option value="live">Ao vivo</option>
        <option value="pre">Futuros</option>
        <option value="post">Finalizados</option>
      </select>
      <button class="btn" id="refreshBtn">Atualizar</button>
    </div>

    <section class="card matchHeader" id="matchHeader"></section>
    <section class="contentPanel card" id="mainPanel" style="margin-top:14px"></section>

    <div class="leagueHeader">Partidas</div>
    <section class="matchList" id="matches"></section>
    <div class="empty" id="footer">Carregando...</div>
  </main>

  <aside class="right">
    <div class="card sideCard">
      <div class="sideTitle">🧠 Leitura rápida</div>
      <div class="base" id="quickRead">Selecione um jogo.</div>
    </div>
    <div class="card sideCard">
      <div class="sideTitle">Base interpretada</div>
      <div class="base" id="baseList"></div>
    </div>
    <div class="card sideCard">
      <div class="sideTitle">Eventos</div>
      <div id="events"></div>
    </div>
  </aside>
</div>

<script>
const $=id=>document.getElementById(id);
let allGames=[], selected=null, details=null, currentTab="overview";
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function pct(a,b){a=Number(a)||0;b=Number(b)||0;const t=a+b;return t?Math.round(a/t*100):50}
function logo(t,cls){return t.logo?`<img class="${cls}" src="${esc(t.logo)}">`:`<span class="${cls}" style="display:inline-grid;place-items:center">${esc((t.name||'?')[0])}</span>`}
function setTheme(t){document.body.dataset.theme=t;localStorage.setItem("theme",t);$("lightBtn").classList.toggle("active",t==="light");$("darkBtn").classList.toggle("active",t==="dark")}
$("lightBtn").onclick=()=>setTheme("light");$("darkBtn").onclick=()=>setTheme("dark");setTheme(localStorage.getItem("theme")||"light");

function renderHeader(g){
  const st=g.live?"AO VIVO":g.state==="pre"?"PRÉ-JOGO":"FINALIZADO";
  $("matchHeader").innerHTML=`
    <div class="scoreboard">
      <div class="competition">${esc(g.league)} · ${esc(g.status||"")}</div>
      <div class="scoreTeams">
        <div class="mainTeam">${logo(g.home,"mainLogo")}<div class="mainName">${esc(g.home.name)}</div></div>
        <div class="scoreBox"><span class="status">${st}</span><div class="bigScore">${esc(g.home.score)} x ${esc(g.away.score)}</div><div class="minute">${esc(g.minute||"")}</div></div>
        <div class="mainTeam">${logo(g.away,"mainLogo")}<div class="mainName">${esc(g.away.name)}</div></div>
      </div>
    </div>
    <div class="tabs">
      <button class="${currentTab==="overview"?"active":""}" data-tab="overview">Resumo</button>
      <button class="${currentTab==="stats"?"active":""}" data-tab="stats">Estatísticas</button>
      <button class="${currentTab==="ai"?"active":""}" data-tab="ai">Leitura IA</button>
      <button class="${currentTab==="post"?"active":""}" data-tab="post">Pós-jogo</button>
      <button class="${currentTab==="news"?"active":""}" data-tab="news">Notícias</button>
    </div>`;
  document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>{currentTab=b.dataset.tab;renderHeader(selected);renderPanel()});
}
function statRows(s){
  const f=s.finalizations||{},t=s.shotsOnGoal||{},c=s.corners||{},p=s.possession||{};
  const rows=[["Finalizações",f.home,f.away],["Chutes no gol",t.home,t.away],["Posse de bola",p.home?p.home+"%":"",p.away?p.away+"%":""],["Escanteios",c.home,c.away]];
  return `<div class="statsGrid">`+rows.map(r=>{const pc=pct(parseFloat(r[1]),parseFloat(r[2]));return `<div class="statRow"><div class="statTop"><span>${esc(r[1]||"-")}</span><span>${esc(r[2]||"-")}</span></div><div class="statLabel">${esc(r[0])}</div><div class="bar"><div class="homeBar" style="width:${pc}%"></div><div class="awayBar" style="width:${100-pc}%"></div></div></div>`}).join("")+`</div>`;
}
function trends(list){return `<div class="trendList">${(list||[]).map(x=>`<div class="trend ${esc(x.status||"")}">${esc(x.label)}</div>`).join("")}</div>`}
function renderPanel(){
  if(!details){$("mainPanel").innerHTML=`<div class="empty">Carregando detalhes...</div>`;return}
  const a=details.analysis||{}, pre=a.pregame||{}, live=a.live||{}, main=a.main||{}, stats=a.displayStats||details.displayStats||{};
  if(currentTab==="stats"){
    $("mainPanel").innerHTML=`<div class="aiBox"><div class="aiTitle">Estatísticas da partida</div><div class="aiText">${live.dataType==="live"?"Dados ao vivo":"Sem dados ao vivo confiáveis; exibindo tendência quando disponível."}</div></div>${statRows(stats)}`;
  } else if(currentTab==="ai"){
    $("mainPanel").innerHTML=`<div class="aiBox"><div class="aiTitle">Leitura IA</div><div class="aiText">${esc(main.reading||pre.reading||"Leitura limitada.")}</div></div>${trends((live.predictions&&live.predictions.length)?live.predictions:pre.predictions)}`;
  } else if(currentTab==="post"){
    const p=details.postGame;
    $("mainPanel").innerHTML=`<div class="aiBox"><div class="aiTitle">Pós-jogo</div><div class="aiText">${esc(p?p.text:"Disponível após a partida.")}</div></div><div class="base">${p?(p.points||[]).map(x=>`<div>${esc(x)}</div>`).join(""):""}</div>`;
  } else if(currentTab==="news"){
    $("mainPanel").innerHTML=`<div class="aiBox"><div class="aiTitle">Notícias relevantes</div><div class="base">${(details.news||[]).map(n=>`<div>${esc(n.title)} <small>(${esc(n.source||"")})</small></div>`).join("")||"Sem notícias relevantes encontradas."}</div></div>`;
  } else {
    $("mainPanel").innerHTML=`<div class="aiBox"><div class="aiTitle">Resumo inteligente</div><div class="aiText">${esc(pre.reading||main.reading||"Leitura limitada.")}</div></div>
      <div class="probGrid">
        <div class="prob"><small>${esc(selected.home.name)}</small><br><b>${esc(pre.winPctHome||"-")}%</b></div>
        <div class="prob"><small>${esc(selected.away.name)}</small><br><b>${esc(pre.winPctAway||"-")}%</b></div>
      </div>
      ${statRows(stats)}`;
  }
}
function renderSide(){
  const a=details?.analysis||{}, main=a.main||{}, pre=a.pregame||{};
  $("quickRead").innerHTML=esc(main.reading||pre.reading||"Leitura limitada.");
  $("baseList").innerHTML=(main.base||pre.base||[]).slice(0,7).map(x=>`<div>${esc(x)}</div>`).join("")||"<div>Base parcial.</div>";
  $("events").innerHTML=(details?.events||[]).slice(-10).reverse().map(e=>`<div class="event"><b>${esc(e.minute)}</b><div>${esc(e.type)} · ${esc(e.detail)}<br><small>${esc(e.team)} ${e.player?"· "+esc(e.player):""}</small></div></div>`).join("")||"<div class='base'>Sem eventos disponíveis.</div>";
}
async function loadDetails(g){
  selected=g;localStorage.setItem("selectedGameKey",`${g.home.name}_${g.away.name}`);details=null;renderHeader(g);renderPanel();
  const gp=encodeURIComponent(JSON.stringify(g));
  try{
    const r=await fetch(`/api/game-details?fixtureId=${encodeURIComponent(g.fixtureId||"")}&sportmonksId=${encodeURIComponent(g.sportmonksId||"")}&game=${gp}&_=${Date.now()}`);
    const d=await r.json();if(!d.ok)throw new Error(d.error);details=d;renderPanel();renderSide();renderMatches();
  }catch(e){$("mainPanel").innerHTML=`<div class="empty">Erro: ${esc(e.message||e)}</div>`}
}
function renderMatches(){
  const q=$("searchInput").value.toLowerCase(), f=$("filterInput").value;
  let games=[...allGames];
  if(q)games=games.filter(g=>(g.home.name+" "+g.away.name+" "+g.league).toLowerCase().includes(q));
  if(f==="live")games=games.filter(g=>g.live);if(f==="pre")games=games.filter(g=>g.state==="pre");if(f==="post")games=games.filter(g=>g.state==="post");
  $("matches").innerHTML=games.map(g=>`<div class="match ${selected&&selected.id===g.id?"active":""}" data-idx="${allGames.indexOf(g)}">
    <small>${esc(g.league)} ${g.live?'<b style="color:var(--brand)">● AO VIVO</b>':''}</small>
    <div class="teams">
      <div class="teamLine"><span class="teamName">${logo(g.home,"miniLogo")}${esc(g.home.name)}</span><span class="score">${esc(g.home.score)}</span></div>
      <div class="teamLine"><span class="teamName">${logo(g.away,"miniLogo")}${esc(g.away.name)}</span><span class="score">${esc(g.away.score)}</span></div>
    </div>
    <small>${esc(g.status)} · ${esc(g.time)}</small>
  </div>`).join("")||"<div class='empty card'>Nenhum jogo encontrado.</div>";
  document.querySelectorAll(".match").forEach(el=>el.onclick=()=>loadDetails(allGames[Number(el.dataset.idx)]));
}
async function loadGames(){
  $("footer").textContent="Buscando jogos...";
  const date=$("dateInput").value||new Date().toISOString().slice(0,10);
  try{
    const r=await fetch(`/api/games?date=${date}&_=${Date.now()}`);const d=await r.json();allGames=d.games||[];
    const key=localStorage.getItem("selectedGameKey");
    let pref=selected&&allGames.find(g=>`${g.home.name}_${g.away.name}`===`${selected.home.name}_${selected.away.name}`);
    if(!pref&&key)pref=allGames.find(g=>`${g.home.name}_${g.away.name}`===key);
    if(!pref)pref=allGames.find(g=>g.live&&(g.sportmonksId||g.fixtureId))||allGames.find(g=>g.sportmonksId||g.fixtureId)||allGames[0];
    renderMatches(); if(pref)loadDetails(pref);
    $("footer").textContent=`${allGames.length} jogos encontrados · atualizado ${new Date().toLocaleTimeString("pt-BR")}`;
  }catch(e){$("footer").textContent="Erro ao carregar jogos."}
}
document.querySelectorAll(".menu button").forEach(b=>b.onclick=()=>{document.querySelectorAll(".menu button").forEach(x=>x.classList.remove("active"));b.classList.add("active");currentTab=b.dataset.tab;renderPanel()});
$("dateInput").value=new Date().toISOString().slice(0,10);$("refreshBtn").onclick=loadGames;$("searchInput").oninput=renderMatches;$("filterInput").onchange=renderMatches;
loadGames();setInterval(loadGames,60000);
</script>
</body>
</html>
