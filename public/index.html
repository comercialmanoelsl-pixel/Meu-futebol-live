<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>DhuniorStats - Central de Pressão</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><style>
:root{--bg:#050914;--panel:#0b1220;--card:#111827;--soft:#162032;--line:rgba(255,255,255,.09);--text:#f8fafc;--muted:#94a3b8;--red:#ef233c;--green:#22c55e;--yellow:#f59e0b;--blue:#38bdf8;--shadow:0 28px 80px rgba(0,0,0,.35)}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at 70% -10%,rgba(239,35,60,.25),transparent 34%),radial-gradient(circle at 20% 20%,rgba(34,197,94,.11),transparent 28%),var(--bg);color:var(--text)}button,input,select{font-family:inherit}.layout{display:grid;grid-template-columns:92px 1fr;min-height:100vh}.rail{background:rgba(2,6,23,.86);border-right:1px solid var(--line);padding:24px 14px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:22px}.logo{font-size:56px;font-weight:900;color:var(--red);line-height:.8}.rail button{height:50px;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:18px;font-size:21px;cursor:pointer}.rail button.active{background:linear-gradient(135deg,rgba(239,35,60,.25),rgba(239,35,60,.07));border-color:rgba(239,35,60,.45);color:#fff;box-shadow:0 0 28px rgba(239,35,60,.22)}main{padding:24px;max-width:1760px;width:100%;margin:0 auto}.top{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:20px}.brand h1{font-size:27px;margin:0;font-weight:950;letter-spacing:-.8px}.brand span{color:var(--red)}.brand p{margin:5px 0 0;color:var(--muted);font-size:13px}.controls{display:flex;gap:10px;flex-wrap:wrap}.chip,input,select,.btn{background:rgba(15,23,42,.78);border:1px solid var(--line);color:#fff;padding:12px 14px;border-radius:16px;font-weight:800;box-shadow:var(--shadow)}input::placeholder{color:#64748b}.btn{cursor:pointer}.grid{display:grid;grid-template-columns:minmax(720px,1fr) 420px;gap:18px}.hero{position:relative;background:linear-gradient(135deg,rgba(17,24,39,.96),rgba(127,29,29,.45));border:1px solid rgba(255,255,255,.1);border-radius:30px;box-shadow:var(--shadow);overflow:hidden}.hero:before{content:"";position:absolute;inset:-30%;background:radial-gradient(circle,rgba(239,35,60,.18),transparent 45%);animation:pulse 6s infinite alternate}@keyframes pulse{from{transform:translateX(-5%)}to{transform:translateX(8%)}}.hero-inner{position:relative;padding:34px;display:grid;grid-template-columns:1fr 210px 1fr;align-items:center;min-height:300px}.team{text-align:center}.crest{width:108px;height:108px;border-radius:50%;margin:0 auto 14px;background:#fff;display:grid;place-items:center;overflow:hidden;border:4px solid rgba(255,255,255,.25);box-shadow:0 0 40px rgba(255,255,255,.11)}.crest img{width:100%;height:100%;object-fit:contain;padding:9px}.crest.fallback{background:#111827;color:#fff;font-size:44px;font-weight:950}.team-name{font-size:25px;font-weight:950;letter-spacing:-.7px}.center{text-align:center}.status{display:inline-flex;gap:8px;align-items:center;background:var(--red);padding:8px 14px;border-radius:999px;font-weight:950;font-size:12px;box-shadow:0 0 24px rgba(239,35,60,.45)}.score{font-size:72px;font-weight:950;line-height:1;margin:12px 0;letter-spacing:-4px}.minute{font-size:28px;color:var(--green);font-weight:950}.league{color:var(--muted);font-weight:700}.pressure-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:16px 0}.big-card,.panel,.stat,.match-card{background:rgba(15,23,42,.86);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}.big-card{padding:22px}.label{color:var(--muted);font-size:12px;font-weight:950;text-transform:uppercase;letter-spacing:.7px}.big-card h2,.panel h2{margin:8px 0 0;font-size:23px;letter-spacing:-.5px}.ai-main{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;margin:16px 0}.panel{padding:22px}.ai-text{font-size:21px;font-weight:900;line-height:1.25}.base{color:var(--muted);line-height:1.55;display:grid;gap:9px;margin-top:14px}.trend{display:grid;gap:10px;margin-top:15px}.trend-item{padding:12px;border-radius:15px;background:rgba(255,255,255,.04);color:var(--muted);font-weight:850}.trend-item.good{color:var(--green);background:rgba(34,197,94,.1)}.trend-item.bad{color:#fb7185;background:rgba(239,35,60,.12)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}.stat{padding:18px}.stat .vals{display:flex;justify-content:space-between;align-items:center;font-size:30px;font-weight:950;margin-top:10px}.bar{height:9px;background:#1f2937;border-radius:999px;display:flex;overflow:hidden;margin-top:12px}.home{background:var(--green)}.away{background:var(--red)}.matches{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}.match-card{padding:15px;cursor:pointer;transition:.18s}.match-card:hover,.match-card.active{border-color:var(--red);transform:translateY(-2px)}.match-row{display:flex;justify-content:space-between;gap:8px;font-weight:950;margin:9px 0}.match-score{color:#fbbf24}.side{display:flex;flex-direction:column;gap:14px}.side .panel{padding:20px}.section-title{font-size:18px;font-weight:950;margin:0 0 12px}.event{display:grid;grid-template-columns:46px 1fr;gap:9px;padding:9px 0;border-bottom:1px solid var(--line);color:var(--muted);font-size:13px}.footer{color:#64748b;text-align:right;margin:16px 0}@media(max-width:1200px){.grid{grid-template-columns:1fr}.side{display:grid;grid-template-columns:1fr 1fr}.stats{grid-template-columns:1fr 1fr}.ai-main{grid-template-columns:1fr}}@media(max-width:760px){.layout{grid-template-columns:1fr}.rail{height:auto;position:relative;flex-direction:row;overflow:auto}.hero-inner{grid-template-columns:1fr;gap:22px}.pressure-strip,.stats,.side{grid-template-columns:1fr}.score{font-size:56px}.top{align-items:flex-start;flex-direction:column}}
</style></head><body><div class="layout"><aside class="rail"><div class="logo">∞</div><button class="active" data-mode="winners" title="Prováveis">🧠</button><button data-mode="radar" title="Radar">📡</button><button data-mode="final" title="Finalizações">🎯</button><button data-mode="target" title="Chutes no gol">🥅</button><button data-mode="corners" title="Escanteios">🚩</button><button data-mode="post" title="Pós-jogo">📌</button><button data-mode="news" title="Notícias">📰</button></aside><main><div class="top"><div class="brand"><h1>Dhunior<span>Stats</span></h1><p>Central de Pressão • Além das estatísticas</p></div><div class="controls"><div class="chip">⚡ Ao vivo inteligente</div><input type="date" id="dateInput"><input id="searchInput" placeholder="Buscar time ou liga"><select id="filterInput"><option value="">Todos</option><option value="live">Ao vivo</option><option value="pre">Futuros</option><option value="post">Finalizados</option><option value="stats">Com cobertura</option></select><button class="btn" id="refreshBtn">Atualizar</button></div></div><div class="grid"><section><div id="hero"></div><div id="pressureStrip" class="pressure-strip"></div><div id="modeArea"></div><div id="statsArea"></div><div id="games" class="matches"></div><div id="footer" class="footer">Carregando...</div></section><aside class="side"><div class="panel"><h2 class="section-title">🧠 Leitura IA</h2><div id="aiBox" class="ai-text">Carregando...</div></div><div class="panel"><h2 class="section-title">Base interpretada</h2><div id="baseList" class="base"></div></div><div class="panel"><h2 class="section-title">📰 Notícias</h2><div id="newsList" class="base"></div></div><div class="panel"><h2 class="section-title">Eventos</h2><div id="events" class="base"></div></div></aside></div></main></div><script>
const $=id=>document.getElementById(id);let allGames=[],selectedGame=null,currentData=null,currentMode="winners";
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function pct(a,b){a=Number(a)||0;b=Number(b)||0;let t=a+b;return t?Math.round(a/t*100):50}
function logo(t){return t.logo?`<div class="crest"><img src="${esc(t.logo)}"></div>`:`<div class="crest fallback">${esc((t.name||"?")[0])}</div>`}
function renderHero(g){const st=g.live?"AO VIVO":g.state==="pre"?"PRÉ-JOGO":"FINALIZADO";$("hero").innerHTML=`<div class="hero"><div class="hero-inner"><div class="team">${logo(g.home)}<div class="team-name">${esc(g.home.name)}</div></div><div class="center"><div class="status">● ${esc(st)}</div><div class="minute">${esc(g.minute||"")}</div><div class="score">${esc(g.home.score)} x ${esc(g.away.score)}</div><div class="league">${esc(g.league)} · ${esc(g.status)}</div></div><div class="team">${logo(g.away)}<div class="team-name">${esc(g.away.name)}</div></div></div></div>`}
function renderMain(g){selectedGame=g;localStorage.setItem("selectedGameKey",`${g.home.name}_${g.away.name}`);renderHero(g);$("aiBox").innerHTML="Carregando leitura...";$("baseList").innerHTML="";$("modeArea").innerHTML="";$("statsArea").innerHTML="";loadDetails(g)}
function renderPressure(a){const pre=a.pregame||{}, live=a.live||{};$("pressureStrip").innerHTML=`<div class="big-card"><div class="label">Pressionando agora</div><h2>${esc(live.pressureTeam||pre.pressureTeam||"-")}</h2></div><div class="big-card"><div class="label">Provável vencedor</div><h2>${esc(pre.probableWinner||"-")}</h2></div><div class="big-card"><div class="label">Confiança</div><h2>${esc(pre.confidence||"Baixa")}</h2></div>`}
function renderStats(s){const f=s.finalizations||{},t=s.shotsOnGoal||{},c=s.corners||{},p=s.possession||{};const cards=[["🎯 Finalizações",f.home,f.away],["🥅 Chutes no gol",t.home,t.away],["◔ Posse",p.home?p.home+"%":"",p.away?p.away+"%":""],["🚩 Escanteios",c.home,c.away]];$("statsArea").innerHTML=`<div class="stats">${cards.map(x=>{let pc=pct(parseFloat(x[1]),parseFloat(x[2]));return `<div class="stat"><div class="label">${x[0]}</div><div class="vals"><span>${esc(x[1]||"-")}</span><span>${esc(x[2]||"-")}</span></div><div class="bar"><div class="home" style="width:${pc}%"></div><div class="away" style="width:${100-pc}%"></div></div></div>`}).join("")}</div>`}
function trendHtml(list){return `<div class="trend">${(list||[]).map(p=>`<div class="trend-item ${esc(p.status||"")}">${esc(p.label)}</div>`).join("")}</div>`}
function renderMode(){if(!currentData)return;const a=currentData.analysis||{}, pre=a.pregame||{}, live=a.live||{}, g=selectedGame;let html="";if(currentMode==="winners"){html=`<div class="ai-main"><div class="panel"><h2 class="section-title">🧠 Prováveis vencedores</h2><div class="ai-text">${esc(pre.reading||"Leitura limitada")}</div><div class="trend">${trendHtml((live.predictions&&live.predictions.length)?live.predictions:pre.predictions)}</div></div><div class="panel"><h2 class="section-title">Probabilidade contextual</h2><div class="big-card"><div class="label">${esc(g.home.name)}</div><h2>${esc(pre.winPctHome||"-")}%</h2></div><br><div class="big-card"><div class="label">${esc(g.away.name)}</div><h2>${esc(pre.winPctAway||"-")}%</h2></div></div></div>`}else if(currentMode==="post"){let p=currentData.postGame;html=`<div class="panel"><h2 class="section-title">📌 Pós-jogo</h2><div class="ai-text">${esc(p?p.text:"Disponível após o fim da partida.")}</div><div class="base">${p?(p.points||[]).map(x=>`<div>${esc(x)}</div>`).join(""):""}</div></div>`}else{let title="📡 Radar",body=a.main?.reading||"Leitura limitada.";if(currentMode==="final"){title="🎯 Finalizações";body=live.dataType==="live"?`Finalizações reais: ${g.home.name}: ${live.finalizations.home||"-"} x ${g.away.name}: ${live.finalizations.away||"-"}.`:"Sem finalizações ao vivo confiáveis."}if(currentMode==="target"){title="🥅 Chutes no gol";body=live.dataType==="live"?`Chutes no gol reais: ${g.home.name}: ${live.shotsOnGoal.home||"-"} x ${g.away.name}: ${live.shotsOnGoal.away||"-"}.`:"Sem chutes no gol ao vivo confiáveis."}if(currentMode==="corners"){title="🚩 Escanteios";body=live.dataType==="live"?`Escanteios reais: ${g.home.name}: ${live.corners.home||"-"} x ${g.away.name}: ${live.corners.away||"-"}.`:"Sem escanteios ao vivo confiáveis."}if(currentMode==="news"){title="📰 Notícias";body=(currentData.news||[]).map(n=>n.title).join(" • ")||"Notícias relevantes não encontradas."}html=`<div class="panel"><h2 class="section-title">${title}</h2><div class="ai-text">${esc(body)}</div></div>`}$("modeArea").innerHTML=html}
function renderSide(d,a){$("aiBox").innerHTML=esc(a.main?.reading||"Leitura limitada");$("baseList").innerHTML=(a.main?.base||a.pregame?.base||[]).slice(0,8).map(x=>`<div>${esc(x)}</div>`).join("")||"<div>Base parcial.</div>";$("newsList").innerHTML=(d.news||[]).map(n=>`<div>${esc(n.title)} <small>(${esc(n.source)})</small></div>`).join("")||"<div>Sem notícias relevantes.</div>";$("events").innerHTML=(d.events||[]).slice(-10).reverse().map(e=>`<div class="event"><b>${esc(e.minute)}</b><div>${esc(e.type)} · ${esc(e.detail)}<br><small>${esc(e.team)} ${e.player?"· "+esc(e.player):""}</small></div></div>`).join("")||"<div>Sem eventos disponíveis.</div>"}
function renderDetails(d){currentData=d;const a=d.analysis||{};renderPressure(a);renderStats(a.displayStats||d.displayStats);renderMode();renderSide(d,a);renderGames()}
async function loadDetails(g){try{const gp=encodeURIComponent(JSON.stringify(g));const r=await fetch(`/api/game-details?fixtureId=${encodeURIComponent(g.fixtureId||"")}&sportmonksId=${encodeURIComponent(g.sportmonksId||"")}&game=${gp}&_=${Date.now()}`);const d=await r.json();if(!d.ok)throw new Error(d.error);renderDetails(d)}catch(e){$("aiBox").innerHTML="Erro: "+esc(e.message||e)}}
function renderGames(){let q=$("searchInput").value.toLowerCase(),f=$("filterInput").value;let games=[...allGames];if(q)games=games.filter(g=>(g.home.name+" "+g.away.name+" "+g.league).toLowerCase().includes(q));if(f==="live")games=games.filter(g=>g.live);if(f==="pre")games=games.filter(g=>g.state==="pre");if(f==="post")games=games.filter(g=>g.state==="post");if(f==="stats")games=games.filter(g=>g.fixtureId||g.sportmonksId);$("games").innerHTML=games.map(g=>`<div class="match-card ${selectedGame&&selectedGame.id===g.id?"active":""}" data-idx="${allGames.indexOf(g)}"><small>${esc(g.league)} ${g.live?'<b style="color:#ef233c">● AO VIVO</b>':''}</small><div class="match-row"><span>${esc(g.home.name)}</span><span class="match-score">${esc(g.home.score)} x ${esc(g.away.score)}</span><span>${esc(g.away.name)}</span></div><small>${esc(g.status)} ${esc(g.time)}</small></div>`).join("");document.querySelectorAll(".match-card").forEach(c=>c.onclick=()=>{renderMain(allGames[Number(c.dataset.idx)]);renderGames()})}
async function loadGames(){try{$("footer").textContent="Buscando jogos...";const date=$("dateInput").value||new Date().toISOString().slice(0,10);const r=await fetch(`/api/games?date=${date}&_=${Date.now()}`);const d=await r.json();allGames=d.games||[];let key=localStorage.getItem("selectedGameKey");let pref=selectedGame&&allGames.find(g=>`${g.home.name}_${g.away.name}`===`${selectedGame.home.name}_${selectedGame.away.name}`);if(!pref&&key)pref=allGames.find(g=>`${g.home.name}_${g.away.name}`===key);if(!pref)pref=allGames.find(g=>g.live&&(g.sportmonksId||g.fixtureId))||allGames.find(g=>g.sportmonksId||g.fixtureId)||allGames[0];if(pref)renderMain(pref);renderGames();$("footer").textContent=`${allGames.length} jogos encontrados · atualizado ${new Date().toLocaleTimeString("pt-BR")}`}catch(e){$("footer").textContent="Erro ao atualizar"}}
document.querySelectorAll(".rail button").forEach(b=>b.onclick=()=>{document.querySelectorAll(".rail button").forEach(x=>x.classList.remove("active"));b.classList.add("active");currentMode=b.dataset.mode;renderMode()});
$("dateInput").value=new Date().toISOString().slice(0,10);$("refreshBtn").onclick=loadGames;$("searchInput").oninput=renderGames;$("filterInput").onchange=renderGames;loadGames();setInterval(loadGames,60000);
</script></body></html>
