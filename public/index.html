<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DhuniorStats</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#edf1f7;--surface:#fff;--surface2:#f7f9fc;--surface3:#eef3f8;--line:#dce4ef;--text:#0b1526;--muted:#64748b;--brand:#ef233c;--green:#16a34a;--yellow:#d97706;--blue:#2563eb;--shadow:0 8px 24px rgba(15,23,42,.07)}
[data-theme="dark"]{--bg:#07111f;--surface:#0e1a2b;--surface2:#132238;--surface3:#182a43;--line:rgba(255,255,255,.09);--text:#f8fafc;--muted:#94a3b8;--shadow:0 14px 42px rgba(0,0,0,.35)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif}button,input,select{font-family:inherit}
.topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 18px;position:sticky;top:0;z-index:50}.logo{font-size:25px;font-weight:950;letter-spacing:-.9px;white-space:nowrap}.logo span{color:var(--brand)}.search{flex:1;max-width:620px;border:1px solid var(--line);background:var(--surface2);color:var(--text);border-radius:12px;padding:11px 14px;font-weight:700}.theme{display:flex;background:var(--surface2);border:1px solid var(--line);border-radius:999px;padding:4px;gap:4px}.theme button{border:0;background:transparent;color:var(--muted);font-weight:900;padding:7px 11px;border-radius:999px;cursor:pointer}.theme button.active{background:var(--brand);color:white}
.app{display:grid;grid-template-columns:410px minmax(520px,1fr);gap:18px;padding:18px;max-width:1820px;margin:0 auto;height:calc(100vh - 60px)}.left{min-height:0;display:flex;flex-direction:column}.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}.filters{padding:16px 16px 10px;display:grid;grid-template-columns:1fr 128px;gap:10px}.field,.btn{border:1px solid var(--line);background:var(--surface2);color:var(--text);border-radius:13px;padding:11px 13px;font-weight:850}.btn{cursor:pointer}
.quick{display:flex;gap:10px;overflow-x:auto;overflow-y:hidden;padding:8px 16px 14px;scrollbar-width:none}.quick::-webkit-scrollbar{display:none}.quick button{white-space:nowrap;min-width:max-content;border:1px solid var(--line);background:var(--surface2);color:var(--muted);border-radius:999px;padding:10px 16px;font-size:13px;font-weight:900;cursor:pointer;box-shadow:0 4px 12px rgba(15,23,42,.04)}.quick button.active{background:rgba(239,35,60,.12);color:var(--brand);border-color:rgba(239,35,60,.28)}
.matchList{padding:10px 14px;overflow:auto;min-height:0;display:grid;gap:10px}.dayTitle{font-size:12px;text-transform:uppercase;letter-spacing:.6px;font-weight:950;color:var(--muted);padding:12px 4px 4px}.match{border:1px solid var(--line);background:var(--surface);border-radius:15px;padding:13px;cursor:pointer;transition:.15s}.match:hover,.match.active{border-color:var(--brand);box-shadow:0 8px 24px rgba(239,35,60,.10)}.match small{color:var(--muted);font-weight:800}.teamLine{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:8px;font-weight:900}.teamName{display:flex;align-items:center;gap:8px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.miniLogo{width:24px;height:24px;border-radius:50%;background:#fff;object-fit:contain;border:1px solid var(--line);flex:0 0 auto}.score{font-weight:950;color:var(--yellow)}
.main{min-width:0;min-height:0;display:grid;grid-template-columns:minmax(500px,1fr) 330px;gap:16px}.matchPage{min-height:0;overflow:auto}.scoreboard{overflow:hidden}.scoreTop{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}.comp{color:var(--muted);font-weight:850;font-size:13px}.status{background:var(--brand);color:white;padding:6px 11px;border-radius:999px;font-size:12px;font-weight:950}.scoreBody{padding:22px;display:grid;grid-template-columns:1fr 160px 1fr;align-items:center;gap:10px;background:linear-gradient(180deg,var(--surface),var(--surface2))}.mainTeam{text-align:center}.mainLogo{width:78px;height:78px;border-radius:50%;object-fit:contain;background:#fff;border:1px solid var(--line);padding:6px}.fallbackLogo{width:78px;height:78px;border-radius:50%;display:inline-grid;place-items:center;background:var(--surface3);font-size:34px;font-weight:950}.mainName{font-size:20px;font-weight:950;margin-top:8px}.centerScore{text-align:center}.bigScore{font-size:48px;font-weight:950;letter-spacing:-2px}.minute{color:var(--green);font-weight:950;margin-top:4px}
.matchTabs{display:flex;gap:6px;padding:10px;background:var(--surface);border-top:1px solid var(--line);overflow:auto;position:sticky;top:0;z-index:10}.matchTabs button{border:0;background:transparent;color:var(--muted);font-weight:950;padding:10px 12px;border-radius:10px;cursor:pointer;white-space:nowrap}.matchTabs button.active{background:rgba(239,35,60,.10);color:var(--brand)}
.panel{margin-top:12px;padding:16px}.title{font-size:17px;font-weight:950;margin-bottom:12px}.aiBox{background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:15px}.aiText{font-size:18px;line-height:1.35;font-weight:880}.statsGrid{display:grid;gap:10px}.statRow{border:1px solid var(--line);background:var(--surface);border-radius:14px;padding:13px}.statTop{display:flex;justify-content:space-between;font-size:20px;font-weight:950}.statLabel{text-align:center;color:var(--muted);font-size:12px;font-weight:950;text-transform:uppercase;margin:7px 0}.bar{height:8px;border-radius:999px;overflow:hidden;background:var(--line);display:flex}.homeBar{background:var(--green)}.awayBar{background:var(--brand)}
.trends{display:grid;gap:8px}.trend{padding:11px;border-radius:12px;background:var(--surface2);color:var(--muted);font-weight:850}.trend.good{color:var(--green)}.trend.bad{color:var(--brand)}.probs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.prob{background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:14px}.prob b{font-size:26px}
.sideTabs{min-height:0;overflow:auto;display:flex;flex-direction:column;gap:12px}.sideNav{padding:8px;display:grid;gap:7px}.sideNav button{border:0;background:transparent;text-align:left;color:var(--muted);font-weight:900;padding:11px;border-radius:11px;cursor:pointer}.sideNav button.active,.sideNav button:hover{background:rgba(239,35,60,.10);color:var(--brand)}.sideContent{padding:15px}.base{display:grid;gap:9px;color:var(--muted);line-height:1.45;font-size:14px}.event{display:grid;grid-template-columns:42px 1fr;gap:8px;border-bottom:1px solid var(--line);padding:8px 0;color:var(--muted);font-size:13px}.event b{color:var(--text)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.infoCard{background:var(--surface2);border:1px solid var(--line);border-radius:13px;padding:12px}.infoCard b{display:block;margin-bottom:8px}.momentum{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;margin:10px 0}.mom{height:34px;border-radius:7px;background:var(--surface3)}.mom.h{background:rgba(22,163,74,.75)}.mom.a{background:rgba(239,35,60,.75)}.standRow{display:grid;grid-template-columns:34px 1fr 42px 42px 42px;gap:8px;border-bottom:1px solid var(--line);padding:8px 0;font-size:13px}.empty{padding:30px;text-align:center;color:var(--muted);font-weight:850}
@media(max-width:1180px){.app{grid-template-columns:1fr;height:auto}.left{height:460px}.main{grid-template-columns:1fr}.sideTabs{display:grid;grid-template-columns:1fr 1fr}}@media(max-width:720px){.topbar{gap:8px}.search{display:none}.app{padding:10px}.scoreBody{grid-template-columns:1fr}.main{display:block}.sideTabs{display:grid;grid-template-columns:1fr}.bigScore{font-size:42px}.filters{grid-template-columns:1fr}}
</style>
</head>
<body data-theme="light">
<header class="topbar">
  <div class="logo">Dhunior<span>Stats</span></div>
  <input class="search" id="searchInput" placeholder="Pesquisar time, liga ou partida">
  <div class="theme"><button id="lightBtn" class="active">Claro</button><button id="darkBtn">Escuro</button></div>
</header>
<div class="app">
  <aside class="left card">
    <div class="filters"><input class="field" type="date" id="dateInput"><select class="field" id="filterInput"><option value="">Todos</option><option value="live">Ao vivo</option><option value="pre">Futuros</option><option value="post">Finalizados</option><option value="fav">Favoritos</option></select></div>
    <div class="quick"><button data-q="" class="active">⭐ Todos</button><button data-q="Brasileirão">🇧🇷 Brasileirão</button><button data-q="Libertadores">🏆 Libertadores</button><button data-q="Sudamericana">🌎 Sul-Americana</button><button data-q="Premier">🏴 Premier</button></div>
    <div class="matchList" id="matchList"></div>
    <button class="btn" id="refreshBtn" style="margin:8px 12px 12px">Atualizar</button>
  </aside>
  <main class="main">
    <section class="matchPage"><div class="card scoreboard" id="scoreboard"></div><div class="card panel" id="mainPanel"></div></section>
    <aside class="sideTabs">
      <div class="card sideNav"><button class="active" data-side="ia">🧠 Leitura IA</button><button data-side="base">📌 Base</button><button data-side="events">⚡ Eventos</button><button data-side="teams">👥 Times</button><button data-side="players">🎯 Jogadores</button><button data-side="table">🏆 Tabela</button><button data-side="news">📰 Notícias</button></div>
      <div class="card sideContent" id="sideContent"></div>
    </aside>
  </main>
</div>
<script>
const $=id=>document.getElementById(id);let allGames=[],selected=null,details=null,tab="overview",sideTab="ia",quick="";
const favs=()=>JSON.parse(localStorage.getItem("favs")||"[]");function saveFavs(a){localStorage.setItem("favs",JSON.stringify(a))}function isFav(name){return favs().includes(name)}function toggleFav(name){let f=favs();f=f.includes(name)?f.filter(x=>x!==name):[...f,name];saveFavs(f);renderMatches();renderScoreboard(selected)}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function pct(a,b){a=Number(a)||0;b=Number(b)||0;const t=a+b;return t?Math.round(a/t*100):50}
function logo(t,cls){return t.logo?`<img class="${cls}" src="${esc(t.logo)}">`:`<span class="fallbackLogo">${esc((t.name||"?")[0])}</span>`}
function setTheme(t){document.body.dataset.theme=t;localStorage.setItem("theme",t);$("lightBtn").classList.toggle("active",t==="light");$("darkBtn").classList.toggle("active",t==="dark")}$("lightBtn").onclick=()=>setTheme("light");$("darkBtn").onclick=()=>setTheme("dark");setTheme(localStorage.getItem("theme")||"light");
function renderScoreboard(g){if(!g){$("scoreboard").innerHTML=`<div class="empty">Selecione uma partida</div>`;return}const status=g.live?"AO VIVO":g.state==="pre"?"PRÉ-JOGO":"FINALIZADO";$("scoreboard").innerHTML=`<div class="scoreTop"><div class="comp">${esc(g.league)} · ${esc(g.status||"")}</div><div><button class="btn" onclick="toggleFav('${esc(g.home.name)}')">${isFav(g.home.name)?"★":"☆"} ${esc(g.home.name)}</button> <span class="status">${status}</span></div></div><div class="scoreBody"><div class="mainTeam">${logo(g.home,"mainLogo")}<div class="mainName">${esc(g.home.name)}</div></div><div class="centerScore"><div class="bigScore">${esc(g.home.score)} x ${esc(g.away.score)}</div><div class="minute">${esc(g.minute||"")}</div><div class="comp">${esc(g.time||"")}</div></div><div class="mainTeam">${logo(g.away,"mainLogo")}<div class="mainName">${esc(g.away.name)}</div></div></div><div class="matchTabs">${["overview:Resumo","stats:Estatísticas","momentum:Momentum","teams:Times","players:Jogadores","lineups:Escalações","ai:Leitura IA","post:Pós-jogo","news:Notícias"].map(x=>{let [k,v]=x.split(":");return `<button class="${tab===k?"active":""}" data-tab="${k}">${v}</button>`}).join("")}</div>`;document.querySelectorAll(".matchTabs button").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;renderScoreboard(selected);renderMainPanel()})}
function statRows(s){const f=s.finalizations||{},t=s.shotsOnGoal||{},c=s.corners||{},p=s.possession||{};const rows=[["Finalizações",f.home,f.away],["Chutes no gol",t.home,t.away],["Posse de bola",p.home?p.home+"%":"",p.away?p.away+"%":""],["Escanteios",c.home,c.away]];return `<div class="statsGrid">${rows.map(r=>{const pc=pct(parseFloat(r[1]),parseFloat(r[2]));return `<div class="statRow"><div class="statTop"><span>${esc(r[1]||"-")}</span><span>${esc(r[2]||"-")}</span></div><div class="statLabel">${esc(r[0])}</div><div class="bar"><div class="homeBar" style="width:${pc}%"></div><div class="awayBar" style="width:${100-pc}%"></div></div></div>`}).join("")}</div>`}
function trends(list){return `<div class="trends">${(list||[]).map(x=>`<div class="trend ${esc(x.status||"")}">${esc(x.label)}</div>`).join("")}</div>`}
function momentum(){let s=details?.analysis?.displayStats||details?.displayStats||{};let h=Number(s.finalizations?.home||0)+Number(s.corners?.home||0)*1.2,a=Number(s.finalizations?.away||0)+Number(s.corners?.away||0)*1.2;let bars=[];for(let i=0;i<12;i++)bars.push(`<div class="mom ${h>=a?(i%4===0?"a":"h"):(i%4===0?"h":"a")}"></div>`);return `<div class="title">Momentum visual</div><div class="momentum">${bars.join("")}</div><div class="base"><div>Verde: pressão do mandante</div><div>Vermelho: pressão do visitante</div></div>`}
function renderMainPanel(){if(!selected){$("mainPanel").innerHTML=`<div class="empty">Selecione uma partida</div>`;return}if(!details){$("mainPanel").innerHTML=`<div class="empty">Carregando detalhes...</div>`;return}const a=details.analysis||{},pre=a.pregame||{},live=a.live||{},main=a.main||{},stats=a.displayStats||details.displayStats||{};if(tab==="stats")$("mainPanel").innerHTML=`<div class="title">Estatísticas</div>${statRows(stats)}`;else if(tab==="momentum")$("mainPanel").innerHTML=momentum();else if(tab==="teams")$("mainPanel").innerHTML=`<div class="title">Times</div><div class="grid2"><div class="infoCard"><b>${esc(selected.home.name)}</b><div class="base">${(pre.base||[]).filter(x=>x.includes(selected.home.name)).slice(0,6).map(x=>`<div>${esc(x)}</div>`).join("")||"Perfil em construção."}</div></div><div class="infoCard"><b>${esc(selected.away.name)}</b><div class="base">${(pre.base||[]).filter(x=>x.includes(selected.away.name)).slice(0,6).map(x=>`<div>${esc(x)}</div>`).join("")||"Perfil em construção."}</div></div></div>`;else if(tab==="players")$("mainPanel").innerHTML=`<div class="title">Jogadores</div><div class="grid2"><div class="infoCard"><b>${esc(selected.home.name)}</b><div class="base">Artilheiros, finalizações e notas aparecem conforme player stats disponíveis.</div></div><div class="infoCard"><b>${esc(selected.away.name)}</b><div class="base">Artilheiros, finalizações e notas aparecem conforme player stats disponíveis.</div></div></div>`;else if(tab==="lineups")renderLineups();else if(tab==="ai")$("mainPanel").innerHTML=`<div class="title">Leitura IA</div><div class="aiBox"><div class="aiText">${esc(main.reading||pre.reading||"Leitura limitada.")}</div></div><br>${trends((live.predictions&&live.predictions.length)?live.predictions:pre.predictions)}`;else if(tab==="post"){let p=details.postGame;$("mainPanel").innerHTML=`<div class="title">Pós-jogo</div><div class="aiBox"><div class="aiText">${esc(p?p.text:"Disponível após o fim da partida.")}</div></div><div class="base" style="margin-top:12px">${p?(p.points||[]).map(x=>`<div>${esc(x)}</div>`).join(""):""}</div>`}else if(tab==="news")$("mainPanel").innerHTML=`<div class="title">Notícias</div><div class="base">${(details.news||[]).map(n=>`<div>${esc(n.title)} <small>(${esc(n.source||"")})</small></div>`).join("")||"Notícias relevantes não encontradas."}</div>`;else $("mainPanel").innerHTML=`<div class="title">Resumo da partida</div><div class="aiBox"><div class="aiText">${esc(pre.reading||main.reading||"Leitura limitada.")}</div></div><div class="probs"><div class="prob"><small>${esc(selected.home.name)}</small><br><b>${esc(pre.winPctHome||"-")}%</b></div><div class="prob"><small>${esc(selected.away.name)}</small><br><b>${esc(pre.winPctAway||"-")}%</b></div></div>${statRows(stats)}`}
function renderLineups(){const l=details.lineups||[];if(!l.length){$("mainPanel").innerHTML=`<div class="title">Escalações</div><div class="grid2"><div class="infoCard"><b>${esc(selected.home.name)}</b><div class="base">Titulares/reservas aparecem quando a API liberar lineups.</div></div><div class="infoCard"><b>${esc(selected.away.name)}</b><div class="base">Titulares/reservas aparecem quando a API liberar lineups.</div></div></div>`;return}$("mainPanel").innerHTML=`<div class="title">Escalações</div><div class="base">${l.slice(0,30).map(x=>`<div>${esc(x.player?.display_name||x.player_name||"Jogador")} · ${esc(x.position?.name||"")}</div>`).join("")}</div>`}
function renderSide(){if(!details){$("sideContent").innerHTML=`<div class="empty">Carregando...</div>`;return}const a=details.analysis||{},pre=a.pregame||{},main=a.main||{};if(sideTab==="ia")$("sideContent").innerHTML=`<div class="title">Leitura IA</div><div class="aiText">${esc(main.reading||pre.reading||"Leitura limitada.")}</div>`;else if(sideTab==="base")$("sideContent").innerHTML=`<div class="title">Base usada</div><div class="base">${(main.base||pre.base||[]).slice(0,11).map(x=>`<div>${esc(x)}</div>`).join("")||"Base parcial."}</div>`;else if(sideTab==="events")$("sideContent").innerHTML=`<div class="title">Eventos</div>${(details.events||[]).slice(-14).reverse().map(e=>`<div class="event"><b>${esc(e.minute)}</b><div>${esc(e.type)} · ${esc(e.detail)}<br><small>${esc(e.team)} ${e.player?"· "+esc(e.player):""}</small></div></div>`).join("")||"<div class='base'>Sem eventos disponíveis.</div>"}`;else if(sideTab==="teams")$("sideContent").innerHTML=`<div class="title">Times</div><div class="base"><button class="btn" onclick="loadTeam('${selected.home.id}','${selected.home.name}')">${esc(selected.home.name)}</button><button class="btn" onclick="loadTeam('${selected.away.id}','${selected.away.name}')">${esc(selected.away.name)}</button></div><div id="teamBox" class="base" style="margin-top:12px"></div>`;else if(sideTab==="players")$("sideContent").innerHTML=`<div class="title">Jogadores</div><div class="base">Área preparada para escalações, finalizações por jogador, cartões e destaques.</div>`;else if(sideTab==="table")loadStandings();else $("sideContent").innerHTML=`<div class="title">Notícias</div><div class="base">${(details.news||[]).map(n=>`<div>${esc(n.title)}</div>`).join("")||"Sem notícias relevantes."}</div>`}
async function loadStandings(){$("sideContent").innerHTML=`<div class="title">Tabela</div><div class="base">Carregando...</div>`;try{let r=await fetch(`/api/standings?leagueId=${selected.leagueId||""}&season=${selected.season||""}`);let d=await r.json();let rows=(d.standings||[]).slice(0,12);$("sideContent").innerHTML=`<div class="title">Tabela</div><div class="standRow"><b>#</b><b>Time</b><b>J</b><b>Pts</b><b>SG</b></div>`+rows.map(x=>`<div class="standRow"><span>${x.rank||"-"}</span><span>${esc(x.team?.name||"-")}</span><span>${x.all?.played||"-"}</span><span>${x.points||"-"}</span><span>${x.goalsDiff||"-"}</span></div>`).join("")||"<div class='base'>Tabela indisponível.</div>"}catch(e){$("sideContent").innerHTML=`<div class="title">Tabela</div><div class="base">Tabela indisponível.</div>`}}
async function loadTeam(id,name){$("teamBox").innerHTML="Carregando perfil...";try{let r=await fetch(`/api/team-profile?teamId=${id}&leagueId=${selected.leagueId||""}&season=${selected.season||""}`);let d=await r.json();let recent=(d.recent||[]).slice(0,5).map(f=>`${f.teams?.home?.name||""} ${f.goals?.home??""} x ${f.goals?.away??""} ${f.teams?.away?.name||""}`);$("teamBox").innerHTML=`<b>${esc(name)}</b>`+recent.map(x=>`<div>${esc(x)}</div>`).join("")}catch(e){$("teamBox").innerHTML="Perfil indisponível."}}
document.querySelectorAll(".sideNav button").forEach(b=>b.onclick=()=>{document.querySelectorAll(".sideNav button").forEach(x=>x.classList.remove("active"));b.classList.add("active");sideTab=b.dataset.side;renderSide()});
async function loadDetails(g){selected=g;details=null;localStorage.setItem("selectedGameKey",`${g.home.name}_${g.away.name}`);renderScoreboard(g);renderMainPanel();renderSide();renderMatches();let gp=encodeURIComponent(JSON.stringify(g));try{let r=await fetch(`/api/game-details?fixtureId=${encodeURIComponent(g.fixtureId||"")}&sportmonksId=${encodeURIComponent(g.sportmonksId||"")}&game=${gp}&_=${Date.now()}`);let d=await r.json();if(!d.ok)throw new Error(d.error);details=d;renderMainPanel();renderSide()}catch(e){$("mainPanel").innerHTML=`<div class="empty">Erro: ${esc(e.message||e)}</div>`}}
function renderMatches(){const q=$("searchInput").value.toLowerCase(),f=$("filterInput").value;let games=[...allGames];if(quick)games=games.filter(g=>g.league.toLowerCase().includes(quick.toLowerCase()));if(q)games=games.filter(g=>(g.home.name+" "+g.away.name+" "+g.league).toLowerCase().includes(q));if(f==="live")games=games.filter(g=>g.live);if(f==="pre")games=games.filter(g=>g.state==="pre");if(f==="post")games=games.filter(g=>g.state==="post");if(f==="fav")games=games.filter(g=>isFav(g.home.name)||isFav(g.away.name));$("matchList").innerHTML=`<div class="dayTitle">Partidas</div>`+games.map(g=>`<div class="match ${selected&&selected.id===g.id?"active":""}" data-idx="${allGames.indexOf(g)}"><small>${esc(g.league)} ${g.live?'<b style="color:var(--brand)">● AO VIVO</b>':''}</small><div class="teamLine"><span class="teamName">${logo(g.home,"miniLogo")}${esc(g.home.name)}</span><span class="score">${esc(g.home.score)}</span></div><div class="teamLine"><span class="teamName">${logo(g.away,"miniLogo")}${esc(g.away.name)}</span><span class="score">${esc(g.away.score)}</span></div><small>${esc(g.status||"")} · ${esc(g.time||"")}</small></div>`).join("")||"<div class='empty'>Nenhum jogo.</div>";document.querySelectorAll(".match").forEach(el=>el.onclick=()=>loadDetails(allGames[Number(el.dataset.idx)]))}
async function loadGames(){let date=$("dateInput").value||new Date().toISOString().slice(0,10);$("matchList").innerHTML=`<div class="empty">Buscando jogos...</div>`;try{let r=await fetch(`/api/games?date=${date}&_=${Date.now()}`);let d=await r.json();allGames=d.games||[];let key=localStorage.getItem("selectedGameKey");let pref=selected&&allGames.find(g=>`${g.home.name}_${g.away.name}`===`${selected.home.name}_${selected.away.name}`);if(!pref&&key)pref=allGames.find(g=>`${g.home.name}_${g.away.name}`===key);if(!pref)pref=allGames.find(g=>g.live&&(g.sportmonksId||g.fixtureId))||allGames.find(g=>g.sportmonksId||g.fixtureId)||allGames[0];renderMatches();if(pref)loadDetails(pref)}catch(e){$("matchList").innerHTML=`<div class="empty">Erro ao carregar jogos.</div>`}}
document.querySelectorAll(".quick button").forEach(b=>b.onclick=()=>{document.querySelectorAll(".quick button").forEach(x=>x.classList.remove("active"));b.classList.add("active");quick=b.dataset.q;renderMatches()});
$("dateInput").value=new Date().toISOString().slice(0,10);$("refreshBtn").onclick=loadGames;$("searchInput").oninput=renderMatches;$("filterInput").onchange=renderMatches;loadGames();setInterval(loadGames,60000);
</script>
</body>
</html>
